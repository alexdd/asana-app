name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            libncurses6 libncurses6-dev \
            zlib1g-dev libffi-dev libssl-dev \
            build-essential autoconf libtool pkg-config
      
      - name: Setup Android SDK
        run: |
          sudo mkdir -p /opt/android-sdk/cmdline-tools
          cd /tmp
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip
          sudo mv cmdline-tools /opt/android-sdk/cmdline-tools/latest
          rm tools.zip
      
      - name: Setup Android environment
        run: |
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools" >> $GITHUB_PATH
          yes | sdkmanager --sdk_root=/opt/android-sdk "platform-tools" "platforms;android-31" "build-tools;31.0.0" || true
      
      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython
      
      - name: Build APK
        run: |
          buildozer android ${{ github.event.inputs.build_type || 'debug' }}
        env:
          P4A_RELEASE_KEYSTORE: ${{ secrets.P4A_RELEASE_KEYSTORE }}
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.P4A_RELEASE_KEYSTORE_PASSWD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.P4A_RELEASE_KEYALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.P4A_RELEASE_KEYALIAS_PASSWD }}
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yoga-asana-timer-apk
          path: bin/*.apk
