name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Dependencies  
      run: |
        sudo apt-get update
        sudo apt-get install -y git unzip openjdk-17-jdk zip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses6-dev libncursesw6-dev
        pip install buildozer cython
        
    - name: Accept Licenses and Build
      run: |
        # Pre-create license directory
        mkdir -p $HOME/.android/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.android/licenses/android-sdk-license
        
        # Initialize and build
        buildozer android update
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yoga-asana-timer
        path: bin/*.apk
