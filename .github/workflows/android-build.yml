name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manueller Trigger via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk git unzip zip wget
    
    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/Android/Sdk/cmdline-tools
        cd $HOME/Android/Sdk/cmdline-tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        mv cmdline-tools latest
        rm commandlinetools-linux-11076708_latest.zip
        
        export ANDROID_HOME=$HOME/Android/Sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
        
        cd $ANDROID_HOME/cmdline-tools/latest/bin
        yes | ./sdkmanager --licenses
        ./sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
        
        echo "ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
      
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    
    - name: Initialize Buildozer SDK
      run: |
        cd $GITHUB_WORKSPACE
        buildozer android update
    
    - name: Install Build Tools in Buildozer SDK
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk
        cd $HOME/.buildozer/android/platform/android-sdk
        
        # Download and extract command-line tools into buildozer's SDK
        mkdir -p cmdline-tools/latest
        cd cmdline-tools/latest
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        rm commandlinetools-linux-11076708_latest.zip
        cd bin
        
        # Accept all licenses automatically (send y 10 times for multiple licenses)
        echo -e "y\ny\ny\ny\ny\ny\ny\ny\ny\ny" | ./sdkmanager --licenses || true
        
        # Install build tools (try multiple times to ensure installation)
        ./sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0"
        
        # Try to install build-tools 36.1.0 if buildozer needs it
        ./sdkmanager "build-tools;36.1.0" || echo "Failed to install 36.1.0, continuing..."
        
    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        buildozer android clean
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yoga-asana-timer
        path: bin/*.apk
        retention-days: 7
        
    - name: Create Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

