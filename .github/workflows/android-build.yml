name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manueller Trigger via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git unzip openjdk-17-jdk zip
        python -m pip install --upgrade pip
        pip install buildozer cython
      
    - name: Pre-accept Android Licenses
      run: |
        mkdir -p $HOME/.android/licenses
        # Add all necessary license hashes
        cat > $HOME/.android/licenses << EOF
24333f8a63b6825ea9c5514f83c2829b004d1fee
601085b94cd77f0b54ff86406957099ebe79c4d6
84831b9409646a918e30573bab4c9c91346d8abd
d975f751698a77b662f1254ddbeed3901e976f5a
8415be50cd9bf7a4b2ea37485c8f3b7ec49f5866
2633d38f943099e9c8e31030b7c4f0cbf976d60b
EOF
        
    - name: Initialize Buildozer
      run: |
        # Set timeout for buildozer update
        timeout 1800 buildozer android update || true
        
    - name: Build APK
      run: |
        buildozer android clean
        buildozer android debug
      env:
        P4A_RELEASE_KEYSTORE: ${{ secrets.P4A_RELEASE_KEYSTORE }}
        P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.P4A_RELEASE_KEYSTORE_PASSWD }}
        P4A_RELEASE_KEYALIAS: ${{ secrets.P4A_RELEASE_KEYALIAS }}
        P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.P4A_RELEASE_KEYALIAS_PASSWD }}
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yoga-asana-timer
        path: bin/*.apk
        retention-days: 7
        
    - name: Create Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
