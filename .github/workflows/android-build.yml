name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git unzip openjdk-17-jdk zip
        python -m pip install --upgrade pip
        pip install buildozer cython
      
    - name: Initialize Buildozer
      run: |
        buildozer android update
        
    - name: Accept SDK Licenses
      run: |
        # Find sdkmanager and accept licenses
        SDKMANAGER=$(find $HOME/.buildozer/android/platform/android-sdk -name sdkmanager 2>/dev/null | head -1)
        if [ -n "$SDKMANAGER" ]; then
          echo "Found sdkmanager at: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses
        else
          echo "Warning: sdkmanager not found"
        fi
        
    - name: Build APK
      run: |
        buildozer android clean
        buildozer android debug
      env:
        P4A_RELEASE_KEYSTORE: ${{ secrets.P4A_RELEASE_KEYSTORE }}
        P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.P4A_RELEASE_KEYSTORE_PASSWD }}
        P4A_RELEASE_KEYALIAS: ${{ secrets.P4A_RELEASE_KEYALIAS }}
        P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.P4A_RELEASE_KEYALIAS_PASSWD }}
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: yoga-asana-timer
        path: bin/*.apk
        retention-days: 7
        
    - name: Create Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
